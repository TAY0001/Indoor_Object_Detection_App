<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Visually Impaired Object Detection</title>
  <style>
    body { font-family: system-ui, Arial; padding: 16px; max-width: 720px; margin: auto; }
    button { font-size: 18px; padding: 12px 16px; margin-right: 8px; }
    #log { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Object Detection (Audio Assist)</h2>

  <input type="file" id="file" accept="image/*">
  <div style="margin-top:12px;">
    <button id="detect">Detect & Speak</button>
    <button id="mute">Mute</button>
  </div>

  <div id="log"></div>

  <script src="app.js"></script>
</body>
</html>
